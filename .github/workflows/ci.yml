name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system deps for PySide6 (Qt)
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon0 libdbus-1-3

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r tests/requirements-test.txt pytest-cov pyyaml

      - name: Run tests (with coverage)
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python -m pytest tests/ -p no:warnings --cov=maya_mcp --cov-report=term --cov-report=xml

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false
          verbose: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    continue-on-error: false  # Chat 47: baseline cleaned, lint is now blocking
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check src/ tests/ --output-format=github

  typecheck:
    name: mypy
    runs-on: ubuntu-latest
    continue-on-error: false  # Chat 47: baseline cleared, mypy is now blocking
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system deps for PySide6 (Qt)
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon0 libdbus-1-3

      - name: Install package + mypy
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install mypy

      - name: Run mypy
        run: mypy src/maya_mcp --ignore-missing-imports --no-strict-optional

  concepts:
    name: verify_concepts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pyyaml + gh (for github_release_per_tag invariant)
        run: |
          pip install pyyaml
          sudo apt-get update && sudo apt-get install -y gh

      - name: Run verify_concepts.py
        env:
          GH_TOKEN: ${{ github.token }}
        run: python scripts/verify_concepts.py
